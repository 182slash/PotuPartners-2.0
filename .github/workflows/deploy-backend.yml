name: CI + Deploy Backend → DigitalOcean App Platform

# DO App Platform can auto-deploy on git push (configure in DO dashboard).
# This workflow adds: CI checks BEFORE the platform picks up the commit,
# and an explicit deploy trigger via the DO API for both Node API + RAG service.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'rag-service/**'
      - '.do/app.yaml'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false   # Never cancel a running deploy

jobs:
  # ─── Job 1: Type-check & lint ────────────────────────────────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (including devDeps)
        working-directory: backend
        run: npm ci

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: backend
        run: npm run lint

  # ─── Job 2: Trigger DO App Platform deploy ───────────────────────────────────
  deploy:
    name: Deploy to DO App Platform
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check   # Only deploy if CI passes

    steps:
      - uses: actions/checkout@v4

      # Trigger a new deployment via the DO API.
      # DO App Platform will pull this commit, build the Dockerfile,
      # and do a zero-downtime container swap automatically.
      - name: Trigger DigitalOcean App Platform deployment
        run: |
          echo "→ Triggering deployment for app: ${{ secrets.DO_APP_ID }}"

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments")

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.deployment.id')
          echo "→ Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      # Poll the deployment until it's active or failed (max ~15 min)
      - name: Wait for deployment to complete
        run: |
          echo "→ Polling deployment $DEPLOYMENT_ID ..."
          for i in $(seq 1 45); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments/$DEPLOYMENT_ID" \
              | jq -r '.deployment.phase')

            echo "  [attempt $i] phase: $STATUS"

            if [[ "$STATUS" == "ACTIVE" ]]; then
              echo "✅  Deployment ACTIVE"
              exit 0
            fi

            if [[ "$STATUS" == "ERROR" || "$STATUS" == "CANCELED" ]]; then
              echo "❌  Deployment failed with phase: $STATUS"
              exit 1
            fi

            sleep 20
          done
          echo "⏱️  Timed out waiting for deployment"
          exit 1

      # Smoke-test the live API health endpoint
      - name: Verify API health
        run: |
          sleep 10
          for i in 1 2 3; do
            STATUS=$(curl -sf "https://api.potupartners.site/health" \
              -w "\n%{http_code}" 2>/dev/null | tail -1 || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅  API health check passed (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i failed (HTTP $STATUS), retrying in 5s..."
            sleep 5
          done
          echo "❌  API health check failed after 3 attempts"
          exit 1

  # ─── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [check, deploy]
    if: always()

    steps:
      - name: Write GitHub summary
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI (type-check + lint) | ${{ needs.check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DO App Platform deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DO App | https://cloud.digitalocean.com/apps/${{ secrets.DO_APP_ID }} |" >> $GITHUB_STEP_SUMMARY
