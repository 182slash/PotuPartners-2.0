# ─────────────────────────────────────────────────────────────────────────────
# PotuPartners — Production Nginx Configuration
# File:   /etc/nginx/sites-available/potupartners
# Enable: ln -s /etc/nginx/sites-available/potupartners /etc/nginx/sites-enabled/
# Test:   nginx -t
# Apply:  systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ─── Rate Limit Zones ─────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_general:10m  rate=20r/s;
limit_req_zone  $binary_remote_addr zone=api_auth:10m     rate=5r/m;
limit_req_zone  $binary_remote_addr zone=api_upload:10m   rate=10r/m;
limit_req_zone  $binary_remote_addr zone=api_ai:10m       rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ─── Upstream — Node.js API ────────────────────────────────────────────────────
upstream potupartners_api {
    server 127.0.0.1:4000;
    keepalive 32;     # Maintain persistent connections to Node.js
}

# ─── Gzip Compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    font/woff
    font/woff2
    image/svg+xml;

# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name api.potupartners.site;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── Main HTTPS Server ────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.potupartners.site;

    # ─── SSL (managed by Certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.potupartners.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.potupartners.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'none'; connect-src 'self'; img-src 'self' https://potupartners-files.sgp1.cdn.digitaloceanspaces.com data:; font-src 'self'; script-src 'none'; style-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Remove server version
    server_tokens off;

    # ─── Connection Limits ────────────────────────────────────────────────────
    limit_conn conn_per_ip 50;

    # ─── General proxy settings ───────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_cache_bypass  $http_upgrade;
    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  60s;

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://potupartners_api;
        access_log off;
    }

    # ─── Auth endpoints — strict rate limit ──────────────────────────────────
    location /api/auth/ {
        limit_req       zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://potupartners_api;
    }

    # ─── File upload — separate limit ─────────────────────────────────────────
    location /api/files/ {
        limit_req       zone=api_upload burst=5 nodelay;
        limit_req_status 429;

        # Allow large file uploads (25MB + overhead)
        client_max_body_size 28m;
        proxy_request_buffering off;     # Stream directly to backend
        proxy_pass_request_body on;
        proxy_read_timeout 120s;

        proxy_pass http://potupartners_api;
    }

    # ─── Admin document upload ────────────────────────────────────────────────
    location /api/admin/rag-documents {
        limit_req       zone=api_upload burst=3 nodelay;
        client_max_body_size 28m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;     # RAG indexing takes time

        proxy_pass http://potupartners_api;
    }

    # ─── AI query endpoint ────────────────────────────────────────────────────
    location /api/ai/ {
        limit_req       zone=api_ai burst=20 nodelay;
        proxy_read_timeout 90s;      # LLM can take time
        proxy_pass http://potupartners_api;
    }

    # ─── General API ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req       zone=api_general burst=50 nodelay;
        limit_req_status 429;
        client_max_body_size 2m;

        proxy_pass http://potupartners_api;
    }

    # ─── Socket.io — WebSocket upgrade ───────────────────────────────────────
    location /chat/ {
        # WebSocket upgrade headers
        proxy_set_header  Upgrade    $http_upgrade;
        proxy_set_header  Connection "upgrade";
        proxy_set_header  Host       $host;
        proxy_set_header  X-Real-IP  $remote_addr;

        proxy_pass            http://potupartners_api;
        proxy_http_version    1.1;
        proxy_read_timeout    86400s;   # Long-lived WebSocket connections
        proxy_send_timeout    86400s;

        # Disable buffering for real-time events
        proxy_buffering off;
    }

    # Socket.io polling fallback
    location /socket.io/ {
        proxy_set_header  Upgrade    $http_upgrade;
        proxy_set_header  Connection "upgrade";
        proxy_set_header  Host       $host;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass         http://potupartners_api;
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
    }

    # ─── Block access to RAG service (internal only) ──────────────────────────
    location /rag-internal/ {
        deny all;
        return 403;
    }

    # ─── Block common attack patterns ─────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        return 444;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ─── Access and error logs ────────────────────────────────────────────────
    access_log /var/log/nginx/potupartners-access.log combined buffer=64k flush=5s;
    error_log  /var/log/nginx/potupartners-error.log warn;
}

# ─── Block unrecognised virtual hosts ────────────────────────────────────────
server {
    listen 80  default_server;
    listen 443 default_server ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/api.potupartners.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.potupartners.site/privkey.pem;

    return 444;
}
